<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zukunftstag – Python Programmieren</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<!-- Monaco Editor (VS Code in the browser) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<style>
/* ── Reset ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/*
  Palette:
  bg-deep   #0B1829  ← main background (dark navy)
  bg-panel  #0F2040  ← card / panel surfaces
  bg-input  #0A1628  ← description / inset areas
  border    #1E4070  ← subtle borders
  accent    #3B82F6  ← primary blue
  accent-hi #60A5FA  ← lighter blue for text/glow
  text-hi   #DBEAFE  ← headings, important text
  text-mid  #93C5FD  ← body labels, descriptions
  text-low  #4D80B8  ← muted hints, placeholders
*/

body {
  font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
  background: #0B1829;
  color: #DBEAFE;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Loading screen ──────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  background: #0B1829;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; z-index: 99;
}
.spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(96,165,250,0.15);
  border-top: 3px solid #60A5FA;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading h2 { color: #93C5FD; font-size: 18px; font-weight: 600; }
#loading p  { color: #4D80B8; font-size: 12.5px; }
#load-bar-wrap {
  width: 240px; height: 5px;
  background: rgba(96,165,250,0.1);
  border-radius: 99px; overflow: hidden;
}
#load-bar {
  height: 100%; width: 0;
  background: linear-gradient(90deg, #1D4ED8, #60A5FA);
  border-radius: 99px; transition: width 0.3s ease;
}

/* ── App shell ───────────────────────────────────────────── */
#app {
  display: none;
  flex-direction: column;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ──────────────────────────────────────────────── */
header {
  flex-shrink: 0;
  background: linear-gradient(135deg, #091525 0%, #0E2040 100%);
  border-bottom: 1px solid #1E4070;
  padding: 11px 22px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
header h1 {
  font-size: 15px; color: #DBEAFE; font-weight: 600;
  letter-spacing: -0.01em;
}
header .badge {
  font-size: 10px; font-weight: 700; color: #60A5FA;
  background: rgba(96,165,250,0.12);
  border: 1px solid rgba(96,165,250,0.3);
  padding: 2px 9px; border-radius: 99px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
header .hint {
  margin-left: auto;
  font-size: 10.5px; color: #4D80B8;
  font-family: 'Fira Code', monospace;
  background: rgba(96,165,250,0.06);
  padding: 3px 8px; border-radius: 5px;
  border: 1px solid #1E4070;
}

/* ── Main layout ─────────────────────────────────────────── */
main {
  flex: 1;
  width: 100%;
  display: flex;
  gap: 14px;
  padding: 14px;
  overflow: hidden;
  min-height: 0;
  box-sizing: border-box;
}

/* ── Left panel (editor – wider) ─────────────────────────── */
#left {
  flex: 2; min-width: 0;
  display: flex; flex-direction: column; gap: 8px;
  overflow: hidden;
}

/* Tabs */
.tab-bar {
  display: flex; gap: 3px; flex-shrink: 0;
  background: rgba(96,165,250,0.04);
  border: 1px solid #1E4070;
  border-radius: 10px;
  padding: 4px;
}
.tab {
  flex: 1; padding: 6px 10px; border: none; border-radius: 7px;
  background: transparent; color: #4D80B8;
  font-family: 'Inter', sans-serif;
  font-weight: 600; font-size: 12.5px; cursor: pointer;
  transition: background 0.16s, color 0.16s, box-shadow 0.16s, transform 0.1s;
  letter-spacing: 0.01em;
}
.tab:hover:not(.active) { background: rgba(96,165,250,0.07); color: #93C5FD; }
.tab.active {
  background: linear-gradient(135deg, #1D4ED8, #2563EB);
  color: white;
  box-shadow: 0 2px 12px rgba(29,78,216,0.55), 0 1px 3px rgba(0,0,0,0.3);
  transform: translateY(-1px);
}

/* Description */
#desc {
  flex-shrink: 0;
  background: #0A1628;
  border: 1px solid #1E4070;
  border-left: 3px solid #3B82F6;
  border-radius: 8px;
  padding: 10px 14px;
  font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 11.5px; color: #93C5FD;
  white-space: pre; line-height: 1.65;
}

/* Editor label */
.col-label {
  font-size: 10px; font-weight: 700; color: #4D80B8;
  flex-shrink: 0; letter-spacing: 0.1em; text-transform: uppercase;
}

/* Monaco wrapper */
#editor {
  flex: 1; min-height: 0;
  border: 1px solid #1E4070;
  border-radius: 8px; overflow: hidden;
}

/* Button row */
.btn-row { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
.btn {
  padding: 7px 16px; border: none; border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-weight: 600; font-size: 13px; cursor: pointer;
  transition: transform 0.1s, box-shadow 0.14s, filter 0.14s;
  letter-spacing: 0.01em;
}
.btn:disabled { opacity: 0.25; cursor: default; transform: none !important; box-shadow: none !important; }
.btn:not(:disabled):hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn:not(:disabled):active { transform: translateY(0); }

.btn-run {
  background: linear-gradient(135deg, #16A34A, #15803D);
  color: white; box-shadow: 0 3px 10px rgba(22,163,74,0.3);
}
.btn-run:not(:disabled):hover { box-shadow: 0 5px 18px rgba(22,163,74,0.5); }

.btn-stop {
  background: linear-gradient(135deg, #DC2626, #B91C1C);
  color: white; box-shadow: 0 3px 10px rgba(220,38,38,0.3);
}
.btn-stop:not(:disabled):hover { box-shadow: 0 5px 18px rgba(220,38,38,0.5); }

.btn-sol {
  background: linear-gradient(135deg, #2563EB, #1D4ED8);
  color: white; box-shadow: 0 3px 10px rgba(37,99,235,0.3);
}
.btn-sol:not(:disabled):hover { box-shadow: 0 5px 18px rgba(37,99,235,0.55); }

/* Shortcut hint */
.shortcut {
  font-size: 10px; color: #4D80B8;
  font-family: 'Fira Code', monospace;
  background: rgba(96,165,250,0.06);
  border: 1px solid #1E4070;
  padding: 3px 7px; border-radius: 5px;

/* Error display */
#err {

  font-family: 'Fira Code', 'Courier New', monospace; font-size: 11px;
  color: #F87171; white-space: pre-wrap; line-height: 1.5;
}

/* ── Right panel (game) ──────────────────────────────────── */
#right {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; gap: 8px;
  overflow: hidden;
}

#canvas-frame {
  flex: 1; min-height: 0; min-width: 0;
  border: 1.5px solid #1E4070;
  border-radius: 14px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #091525;
  box-shadow:
    0 0 0 1px rgba(96,165,250,0.06),
    0 0 28px rgba(29,78,216,0.2),
    0 12px 40px rgba(0,0,0,0.5);
}
canvas { display: block; cursor: crosshair; max-width: 100%; max-height: 100%; }

#score-row {
  display: flex; align-items: center; gap: 12px;

}
#score  { font-size: 13px; font-weight: 600; color: #93C5FD; }
#status { font-size: 11px; color: #4D80B8; flex-shrink: 0; }
</style>

<!-- ═══════════════════ GAME ENGINE (JavaScript) ═════════════ -->
<script>
'use strict';

const CW = 480, CH = 360, ZIEL = 20;
let mouseX = CW / 2, mouseY = CH / 2;

// ── Scratch Cat SVG (embedded, no external request needed) ────
const _CAT_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="-50 -60 100 115">
  <!-- tail (behind body) -->
  <path d="M16,42 Q44,28 42,6 Q40,-12 26,-6"
        fill="none" stroke="#FFAB19" stroke-width="11" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="0" cy="22" rx="25" ry="28" fill="#FFAB19"/>
  <!-- belly -->
  <ellipse cx="0" cy="29" rx="16" ry="20" fill="#FFDDA0"/>
  <!-- body stripes -->
  <path d="M-21,8 Q0,5 21,8"   fill="none" stroke="#C68700" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M-23,19 Q0,16 23,19" fill="none" stroke="#C68700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- head -->
  <circle cx="0" cy="-18" r="29" fill="#FFAB19"/>
  <!-- face (cream) -->
  <ellipse cx="0" cy="-10" rx="21" ry="20" fill="#FFDDA0"/>
  <!-- left ear -->
  <polygon points="-29,-22 -38,-55 -9,-33" fill="#FFAB19"/>
  <polygon points="-28,-24 -34,-49 -11,-32" fill="#FF9999"/>
  <!-- right ear -->
  <polygon points="29,-22 38,-55 9,-33" fill="#FFAB19"/>
  <polygon points="28,-24 34,-49 11,-32" fill="#FF9999"/>
  <!-- left eye -->
  <circle cx="-12" cy="-23" r="11" fill="white"/>
  <circle cx="-10" cy="-22" r="7.5" fill="#333"/>
  <circle cx="-14" cy="-26" r="3" fill="white"/>
  <!-- right eye -->
  <circle cx="12" cy="-23" r="11" fill="white"/>
  <circle cx="14" cy="-22" r="7.5" fill="#333"/>
  <circle cx="10" cy="-26" r="3" fill="white"/>
  <!-- nose -->
  <path d="M-4,-6 L0,-2 L4,-6 Z" fill="#FF9999"/>
  <!-- mouth -->
  <path d="M-7,0 Q0,7 7,0" fill="none" stroke="#C08080" stroke-width="1.8" stroke-linecap="round"/>
  <!-- whiskers left -->
  <line x1="-34" y1="-8" x2="-6" y2="-5" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="-34" y1="-1" x2="-6" y2="-1" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <!-- whiskers right -->
  <line x1="6" y1="-5" x2="34" y2="-8" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="-1" x2="34" y2="-1" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
  <!-- paws -->
  <ellipse cx="-16" cy="48" rx="12" ry="9" fill="#FFAB19"/>
  <ellipse cx="16"  cy="48" rx="12" ry="9" fill="#FFAB19"/>
</svg>`;

const _catImg = new Image();
_catImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(_CAT_SVG);
let _catReady = false;
_catImg.onload = () => { _catReady = true; };

// ── Katze ─────────────────────────────────────────────────────
class Katze {
  constructor() {
    this.x = CW / 2;  this.y = CH / 2;
    this._a = 0;       // angle radians: 0 = facing up
    this.RADIUS = 26;
  }
  drehe_zu_maus() {
    this._a = Math.atan2(mouseY - this.y, mouseX - this.x) + Math.PI / 2;
  }
  gehe(s) {
    this.x = Math.max(this.RADIUS, Math.min(CW - this.RADIUS, this.x + Math.sin(this._a) * s));
    this.y = Math.max(this.RADIUS, Math.min(CH  - this.RADIUS, this.y - Math.cos(this._a) * s));
  }
  beruehrt_maus() {
    return Math.hypot(mouseX - this.x, mouseY - this.y) < this.RADIUS + 8;
  }
  beruehrt(obj) {
    return Math.hypot(obj.x - this.x, obj.y - this.y) < this.RADIUS + (obj.RADIUS || 15);
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this._a);
    // Draw Scratch cat: viewBox is -50,-60 to 50,55 → render at 90×103px centred
    if (_catReady) {
      ctx.drawImage(_catImg, -45, -54, 90, 103);
    } else {
      // Fallback: simple orange circle while image loads
      ctx.fillStyle = '#FFAB19';
      ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── Apfel ─────────────────────────────────────────────────────
class Apfel {
  constructor() { this.RADIUS = 16;  this.reset(); }
  reset()         { this.x = 30 + Math.random() * (CW - 60);  this.y = -20; }
  neu_setzen()    { this.reset(); }
  beruehrt_rand() { return this.y > CH + 20; }
  draw(ctx) {
    ctx.save(); ctx.translate(this.x, this.y);
    ctx.fillStyle = '#CC2020'; ctx.strokeStyle = '#881010'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, this.RADIUS, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#FF6060';
    ctx.beginPath(); ctx.ellipse(-5, -6, 5, 3.5, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#553311'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, -this.RADIUS); ctx.lineTo(2, -this.RADIUS - 7); ctx.stroke();
    ctx.fillStyle = '#33AA33';
    ctx.beginPath(); ctx.ellipse(5, -this.RADIUS - 5, 5.5, 3.5, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Ei ────────────────────────────────────────────────────────
class Ei {
  constructor() {
    this.RADIUS = 14;
    this._x = 0;  this._y = 0;
    this._crack = 0;  this._wait = 0;
    this.reset();
  }
  reset() {
    this._x = 30 + Math.random() * (CW - 60);
    this._y = -20;
    this._crack = 0;  this._wait = 0;
  }
  // Getters / setters so  ei.y += 4  is frozen during animations
  get x()  { return this._x; }  set x(v) { this._x = +v; }
  get y()  { return this._y; }
  set y(v) { if (!this.in_animation) this._y = +v; }
  get in_animation() { return this._crack > 0 || this._wait > 0; }

  neu_setzen()           { this.reset(); }
  beruehrt_rand()        { return !this.in_animation && this._y > CH + 20; }
  neu_setzen_mit_pause() { this._wait = 60;  this._y = CH + 300; }
  knacke()               { this._crack = 60; }

  tick() {
    if      (this._crack > 0) { if (--this._crack === 0) this.reset(); }
    else if (this._wait  > 0) { if (--this._wait  === 0) this.reset(); }
  }
  draw(ctx) {
    if (this._wait > 0) return;
    const cracked = this._crack > 0;
    ctx.save(); ctx.translate(this._x, this._y);
    ctx.fillStyle   = cracked ? '#FFE060' : '#FFFCE8';
    ctx.strokeStyle = cracked ? '#CC9900' : '#BBBB88';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, 0, 14, 18, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    if (cracked) {
      ctx.strokeStyle = '#886600'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(-5,-4); ctx.lineTo(5,6); ctx.stroke();
      ctx.fillStyle = '#CC0000'; ctx.font = 'bold 13px Arial';
      ctx.fillText('Crack!', 18, -12);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.ellipse(-5, -9, 5, 3, -0.3, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── Punkte ────────────────────────────────────────────────────
class Punkte {
  constructor() { this.wert = 0; }
  aendern(n) { this.wert += +n; }
}

// ── Game state ────────────────────────────────────────────────
let katzeObj = null, apfelObj = null, eiObj = null, punkteObj = null;
let running = false, updateFn = null;

const canvas = document.getElementById('cv');
const ctx    = canvas.getContext('2d');

// ── Responsive + HiDPI canvas ─────────────────────────────────
// Measures the actual frame size after CSS layout, scales the
// canvas to fill it while keeping game coords at CW×CH, and
// multiplies by devicePixelRatio so it's always crisp.
function fitCanvas() {
  const frame = document.getElementById('canvas-frame');
  const dpr   = window.devicePixelRatio || 1;
  const fw = frame.clientWidth  - 2;   // subtract border
  const fh = frame.clientHeight - 2;
  if (fw < 10 || fh < 10) return;

  // Fit 4:3 game area into the frame, maintaining aspect ratio
  const aspect = CW / CH;
  let dispW = fw, dispH = fw / aspect;
  if (dispH > fh) { dispH = fh; dispW = fh * aspect; }
  dispW = Math.floor(dispW);
  dispH = Math.floor(dispH);

  canvas.style.width  = dispW + 'px';
  canvas.style.height = dispH + 'px';
  canvas.width  = dispW * dpr;
  canvas.height = dispH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);   // reset + apply DPR scale

  if (!running) drawStartScreen();
}
new ResizeObserver(fitCanvas).observe(document.getElementById('canvas-frame'));

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});

// ── Background helpers ────────────────────────────────────────
function drawBg() {
  // Rich sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, CH - 45);
  sky.addColorStop(0,   '#3A85C8');
  sky.addColorStop(0.5, '#6BAEE0');
  sky.addColorStop(1,   '#B8DFF5');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CW, CH - 45);

  // Sun with rays
  const sx = CW - 48, sy = 42;
  ctx.save();
  ctx.translate(sx, sy);
  // outer glow
  const sunGlow = ctx.createRadialGradient(0, 0, 14, 0, 0, 52);
  sunGlow.addColorStop(0, 'rgba(255,230,60,0.45)');
  sunGlow.addColorStop(1, 'rgba(255,200,0,0)');
  ctx.fillStyle = sunGlow;
  ctx.beginPath(); ctx.arc(0, 0, 52, 0, Math.PI*2); ctx.fill();
  // rays
  ctx.strokeStyle = 'rgba(255,220,0,0.55)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * 20, Math.sin(a) * 20);
    ctx.lineTo(Math.cos(a) * 33, Math.sin(a) * 33);
    ctx.stroke();
  }
  // sun disc
  ctx.fillStyle = '#FFD93D';
  ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFE76A';
  ctx.beginPath(); ctx.arc(-4, -4, 7, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // Fluffy clouds
  function cloud(cx, cy, scale) {
    ctx.save(); ctx.translate(cx, cy); ctx.scale(scale, scale);
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    for (const [dx, dy, r] of [
      [0,0,18], [-22,6,14], [20,7,13], [-10,-8,13], [10,-8,11], [-32,12,10], [30,12,9]
    ]) {
      ctx.beginPath(); ctx.arc(dx, dy, r, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  cloud(75,  40, 1.0);
  cloud(210, 28, 0.85);
  cloud(370, 50, 0.75);

  // Meadow
  const grass = ctx.createLinearGradient(0, CH - 45, 0, CH);
  grass.addColorStop(0, '#5EBD2F');
  grass.addColorStop(1, '#3D8A1A');
  ctx.fillStyle = grass;
  ctx.fillRect(0, CH - 45, CW, 45);
  // bright top edge
  ctx.fillStyle = '#78D43A';
  ctx.fillRect(0, CH - 45, CW, 6);
  // subtle grass tufts
  ctx.strokeStyle = '#4CAD22'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  for (let x = 8; x < CW; x += 18) {
    const h = 4 + (x * 7 % 5);
    ctx.beginPath(); ctx.moveTo(x, CH - 45); ctx.lineTo(x - 3, CH - 45 - h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + 5, CH - 45); ctx.lineTo(x + 8, CH - 45 - h + 1); ctx.stroke();
  }
}

function drawHUD() {
  if (!punkteObj) return;
  const p = punkteObj.wert;
  // Score pill
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.roundRect(8, 6, 170, 26, 7); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(8, 6, 170, 26, 7); ctx.stroke();
  ctx.fillStyle = 'white'; ctx.font = 'bold 14px Inter, Arial';
  ctx.fillText(`★  ${p} / ${ZIEL}`, 16, 24);
  // Progress bar track
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.roundRect(10, 36, CW - 20, 6, 3); ctx.fill();
  // Progress bar fill (gradient green → yellow near end)
  const frac = Math.max(0, Math.min(1, p / ZIEL));
  const bw = frac * (CW - 20);
  if (bw > 0) {
    const barGrad = ctx.createLinearGradient(10, 0, 10 + (CW - 20), 0);
    barGrad.addColorStop(0,   '#22C55E');
    barGrad.addColorStop(0.7, '#4ADE80');
    barGrad.addColorStop(1,   '#FACC15');
    ctx.fillStyle = barGrad;
    ctx.beginPath(); ctx.roundRect(10, 36, bw, 6, 3); ctx.fill();
  }
  // External label
  document.getElementById('score').textContent = `Punkte: ${p}  /  Ziel: ${ZIEL}`;
}

function drawMouseDot() {
  // Small glowing target dot so the player can always see the cursor
  ctx.save();
  ctx.beginPath(); ctx.arc(mouseX, mouseY, 5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.fill();
  ctx.beginPath(); ctx.arc(mouseX, mouseY, 8, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();
}

function drawWinOverlay() {
  // dim the background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, CW, CH);

  // card
  ctx.fillStyle = 'rgba(10,20,15,0.96)';
  ctx.beginPath(); ctx.roundRect(50, 70, CW - 100, 210, 16); ctx.fill();
  // card border
  const borderGrad = ctx.createLinearGradient(50, 70, CW - 50, 280);
  borderGrad.addColorStop(0, '#16A34A');
  borderGrad.addColorStop(1, '#4ADE80');
  ctx.strokeStyle = borderGrad; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(50, 70, CW - 100, 210, 16); ctx.stroke();

  ctx.textAlign = 'center';

  // trophy + title
  ctx.font = 'bold 40px Arial'; ctx.fillStyle = '#FFD700';
  ctx.fillText('🏆', CW / 2, 130);
  ctx.font = 'bold 28px Inter, Arial'; ctx.fillStyle = '#4ADE80';
  ctx.fillText('GEWONNEN!', CW / 2, 170);

  // sub text
  ctx.font = '15px Inter, Arial'; ctx.fillStyle = '#A7F3D0';
  ctx.fillText(`Du hast ${ZIEL} Punkte gesammelt!`, CW / 2, 202);

  // hint
  ctx.font = '12px Inter, Arial'; ctx.fillStyle = '#374151';
  ctx.fillText('Klicke "Starten" für eine neue Runde', CW / 2, 252);

  ctx.textAlign = 'left';
}

function drawStartScreen() {
  drawBg();
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.roundRect(CW/2 - 175, CH/2 - 25, 350, 50, 8); ctx.fill();
  ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Wähle eine Aufgabe und klicke "Starten"!', CW/2, CH/2 + 6);
  ctx.textAlign = 'left';
}

// ── Game loop ─────────────────────────────────────────────────
function gameLoop() {
  if (!running) return;

  try {
    updateFn();
  } catch (e) {
    const msg = (e.message || String(e)).split('\n').filter(l => l.trim()).pop();
    setErr('❌ Laufzeit-Fehler: ' + msg);
    _stopGame();
    return;
  }

  if (eiObj) eiObj.tick();

  // Draw frame
  ctx.clearRect(0, 0, CW, CH);
  drawBg();
  if (apfelObj) apfelObj.draw(ctx);
  if (eiObj)    eiObj.draw(ctx);
  if (katzeObj) katzeObj.draw(ctx);
  drawHUD();
  drawMouseDot();   // always visible target the cat chases

  // Win check
  if (punkteObj && punkteObj.wert >= ZIEL) {
    running = false;
    drawWinOverlay();
    document.getElementById('btn-run').disabled  = false;
    document.getElementById('btn-stop').disabled = true;
    document.getElementById('status').textContent = '🏆 GEWONNEN! Herzlichen Glückwunsch!';
    return;
  }

  requestAnimationFrame(gameLoop);
}

function _stopGame() {
  running = false;
  if (updateFn) { try { updateFn.destroy(); } catch(e){} updateFn = null; }
  document.getElementById('btn-run').disabled  = false;
  document.getElementById('btn-stop').disabled = true;
}
</script>


<!-- ═══════════════════ APP LOGIC + INIT ═════════════════════ -->
<script>
'use strict';

let pyodide = null;
let editor  = null;
let currentTask = 1;

function setErr(msg) { document.getElementById('err').textContent = msg; }
function clrErr()    { document.getElementById('err').textContent = ''; }

// ── Task management ───────────────────────────────────────────
function loadTask(n) {
  stopGame();
  currentTask = n;
  for (let i = 1; i <= 3; i++)
    document.getElementById(`tab${i}`).classList.toggle('active', i === n);
  document.getElementById('desc').textContent = DESCRIPTIONS[n];
  if (editor) editor.setValue(TEMPLATES[n]);
  clrErr();
  drawStartScreen();
  document.getElementById('score').textContent  = '';
  document.getElementById('status').textContent = '→ Wähle eine Aufgabe und klicke "Starten"!';
}

function showSolution() {
  stopGame();
  if (editor) editor.setValue(SOLUTIONS[currentTask]);
  clrErr();
}

// ── Run code ──────────────────────────────────────────────────
async function runCode() {
  if (!pyodide || !editor) return;
  stopGame();
  clrErr();

  const n    = currentTask;
  const code = editor.getValue();

  // Create fresh game objects
  katzeObj  = new Katze();
  apfelObj  = n >= 2 ? new Apfel() : null;
  eiObj     = n >= 3 ? new Ei()    : null;
  punkteObj = new Punkte();

  // Expose JS objects to Python
  pyodide.globals.set('katze',  katzeObj);
  pyodide.globals.set('apfel',  apfelObj);
  pyodide.globals.set('ei',     eiObj);
  pyodide.globals.set('punkte', punkteObj);

  // Execute student code (defines update())
  try {
    await pyodide.runPythonAsync(code);
  } catch (e) {
    const raw   = e.message || String(e);
    const lines = raw.split('\n').filter(l => l.trim());
    const last  = lines[lines.length - 1] || raw;
    const lineM = raw.match(/line (\d+)/);
    setErr(`❌ ${last}${lineM ? '  (Zeile ' + lineM[1] + ')' : ''}`);
    return;
  }

  const fn = pyodide.globals.get('update');
  if (!fn || fn.type !== 'function') {
    setErr("❌ Keine update()-Funktion gefunden!\n   Schreibe 'def update():' in deinen Code.");
    return;
  }
  updateFn = fn;

  // Start loop
  running = true;
  document.getElementById('btn-run').disabled  = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('score').textContent  = `Punkte: 0  /  Ziel: ${ZIEL}`;
  document.getElementById('status').textContent = '▶ Spiel läuft – bewege die Maus über die Spielfläche!';
  requestAnimationFrame(gameLoop);
}

function stopGame() {
  _stopGame();
  document.getElementById('status').textContent = '■ Gestoppt';
  document.getElementById('score').textContent  = '';
}

// ── Initialisation ────────────────────────────────────────────
async function init() {
  const loadBar = document.getElementById('load-bar');
  const loadMsg = document.getElementById('load-msg');

  // 1. Load Monaco Editor
  loadMsg.textContent = 'Lade Code-Editor…';
  loadBar.style.width = '20%';

  await new Promise(resolve => {
    window.MonacoEnvironment = {
      getWorkerUrl: () => `data:text/javascript;charset=utf-8,${encodeURIComponent(`
        self.MonacoEnvironment = {
          baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/'
        };
        importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/base/worker/workerMain.js');
      `)}`
    };
    require.config({
      paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }
    });
    require(['vs/editor/editor.main'], () => {
      editor = monaco.editor.create(document.getElementById('editor'), {
        value:                  TEMPLATES[1],
        language:               'python',
        theme:                  'vs-dark',
        fontSize:               12,
        lineHeight:             19,
        fontFamily:             "'Fira Code', 'Cascadia Code', 'Courier New', monospace",
        fontLigatures:          true,
        minimap:                { enabled: false },
        scrollBeyondLastLine:   false,
        automaticLayout:        true,
        renderLineHighlight:    'line',
        tabSize:                4,
        insertSpaces:           true,
        wordWrap:               'off',
        scrollbar:              { verticalScrollbarSize: 6, horizontalScrollbarSize: 6 },
        lineNumbers:            'on',
        glyphMargin:            false,
        folding:                false,
        padding:                { top: 8, bottom: 8 },
      });
      // Ctrl/Cmd + Enter = Run
      editor.addCommand(
        monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,
        () => runCode()
      );
      resolve();
    });
  });

  loadBar.style.width = '50%';
  loadMsg.textContent = 'Lade Python-Runtime (WebAssembly)…';

  // 2. Load Pyodide
  try {
    pyodide = await loadPyodide({
      indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/'
    });
  } catch (e) {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:30px">
        <p style="color:#F87171;font-size:16px">❌ Python konnte nicht geladen werden.</p>
        <p style="color:#64748B;margin-top:8px">Bitte Internetverbindung prüfen und die Seite neu laden.</p>
      </div>`;
    return;
  }

  loadBar.style.width = '100%';
  loadMsg.textContent = 'Fertig!';

  // 3. Show app
  await new Promise(r => setTimeout(r, 300));
  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  // Let the browser finish layout before measuring the canvas frame
  requestAnimationFrame(() => { fitCanvas(); loadTask(1); });
}

// Kick off
init();
</script>
